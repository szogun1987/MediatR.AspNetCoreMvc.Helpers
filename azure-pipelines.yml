# ASP.NET Core
# Build and test ASP.NET Core projects targeting .NET Core.
# Add steps that run tests, create a NuGet package, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

steps:
- checkout: self
  persistCredentials: true
  clean: true

- script: |
    chmod +x ./bump-version.sh
    VERSION=$(cat version | ./bump-version.sh)
    echo "$VERSION" > version
    git config --global user.email "azure-pipeline@szogun-ui.pl"
    git config --global user.name "Azure pipeline"
    git add version
    git commit -m "[skip ci]"
    git push
    git tag "releases/$VERSION"
    git push origin "releases/$VERSION"
    echo "##vso[task.setvariable variable=packageVersion]${VERSION}-alpha"
  displayName: 'Bump version'

- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: 'src/**/*.csproj'
    arguments: >-
      --configuration $(buildConfiguration)
      -p:Version=$(packageVersion)
      -p:AssemblyVersion=$(packageVersion).0
      -p:FileVersion=$(packageVersion).0
      -p:GeneratePackageOnBuild=false

- task: DotNetCoreCLI@2
  displayName: 'Pack'
  inputs:
    command: 'pack'
    packagesToPack: 'src/**/*.csproj'
    nobuild: true
    versioningScheme: 'off'
    packDirectory: '$(Build.ArtifactStagingDirectory)'
    arguments: '-p:PackageVersion=$(packageVersion)'

- task: PublishPipelineArtifact@1
  displayName: 'Publish nupkg artifact'
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)'
    artifact: 'nupkg'

- script: |
    dotnet nuget push "$(Build.ArtifactStagingDirectory)/*.nupkg" \
      --api-key $(nuget.apiKey) \
      --source https://api.nuget.org/v3/index.json \
      --skip-duplicate
  displayName: 'Push to NuGet.org'
